<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#1f1f25"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Yellow brand stripe at top -->
  <rect x="0" y="0" width="1200" height="6" fill="#F8CC0F"/>
  <!-- Diagonal accent -->
  <path d="M900 -50 L1300 200 L1300 -50 Z" fill="#F8CC0F" opacity="0.08"/>
  <!-- Logo: yellow K-block + KRUGER text -->
  <g transform="translate(80, 200)">
    <path d="M115 110 H0 L34 0 H158 L115 110 Z" fill="#F8CC0F"/>
    <text x="0" y="200" font-family="Manrope, system-ui, sans-serif" font-size="120" font-weight="900" fill="#ffffff" letter-spacing="-2">KRÜGER</text>
    <text x="0" y="248" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F8CC0F" letter-spacing="8">MOTOR OIL · MADE IN GERMANY</text>
  </g>
  <!-- Tagline bottom-left -->
  <g transform="translate(80, 510)">
    <rect x="0" y="0" width="60" height="3" fill="#E51E25"/>
    <text x="80" y="6" dominant-baseline="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#E51E25" letter-spacing="5">ПРЕМИАЛЬНЫЕ МОТОРНЫЕ МАСЛА</text>
    <text x="0" y="50" font-family="Manrope, system-ui, sans-serif" font-size="34" font-weight="700" fill="#ffffff">150+ продуктов · 50+ стран · 12 OEM-одобрений</text>
  </g>
</svg>
